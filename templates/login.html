{% extends "base.html" %}
{% block title %}Sign in — EcoPulse{% endblock %}

{% block body %}
<main class="auth-page">
  <div class="auth-card">
    <a class="auth-brand" href="{{ url_for('views.index') }}">{% include "_logo.html" %}</a>
    <h1>Welcome back</h1>
    <p class="auth-sub">Sign in to your dashboard.</p>
    {% include "_flash.html" %}
    <form method="post" novalidate>
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" value="{{ email or '' }}" required autofocus>
      <label for="password">Password</label>
      <input id="password" name="password" type="password" required>
      <label class="check"><input type="checkbox" name="remember"> Keep me signed in</label>
      <button class="btn btn-primary btn-block" type="submit">Sign in</button>
    </form>
    <p class="auth-alt">New to EcoPulse? <a href="{{ url_for('auth.register') }}">Create an account</a></p>
  </div>
</main>
{% endblock %}
